<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deck builder</title>
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css">

</head>
<body>
<div id="container">
    <header>
        <nav>
            <div id="searchBar">
                <form action="/mtg/search" method="get">
                    <input type="text" name="name" id="searchInput">
                    <button type="submit"><i class="fi fi-rr-search"></i></button>
                </form>
            </div>

            <ul>
                <li><a href="http://localhost:8080/home/">Home</a></li>
                <li><a href="http://localhost:8080/api/cards">Decks</a></li>
                <li><a href="http://localhost:8080/home/search/">Search</a></li>
            </ul>
        </nav>
    </header>

    <article id="cardContainer">
        <section th:each="card : ${cards}" class="card">
            <img th:src="${card.imageUrl}" alt="Carta" />
        </section>
    </article>

    <footer id="pagination">
        <span>
            <a th:if="${currentPage > 1}"
               th:href="@{/mtg(page=${currentPage - 1})}"
               class="arrowLink">
               <i class="fi fi-sr-arrow-circle-left"></i>
            </a>
            <a th:if="${currentPage == 0}"
               href="#" class="arrowLink disabled">
               <i class="fi fi-sr-arrow-circle-left"></i>
            </a>
        </span>

            <span>
            <span th:text="${currentPage}"></span> - <span th:text="${totalPages - 1}"></span>
        </span>

        <span>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/mtg(page=${currentPage + 1})}"
               class="arrowLink">
               <i class="fi fi-sr-arrow-circle-right"></i>
            </a>
            <a th:if="${currentPage >= totalPages - 1}"
               href="#" class="arrowLink disabled">
               <i class="fi fi-sr-arrow-circle-right"></i>
            </a>
        </span>
    </footer>
</div>
</body>
</html>
